name: Soroban CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      # Fails the build on high/critical Cargo advisories.
      # To triage a false-positive, add it to .cargo/audit.toml under
      # [advisories] ignore = ["RUSTSEC-XXXX-XXXX"].
      - name: Cargo Audit (high/critical)
        run: cargo audit --deny warnings

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Fails the build on high/critical npm advisories.
      # To triage a finding run: npm audit --audit-level=high
      # and follow https://docs.npmjs.com/auditing-package-dependencies-for-security-vulnerabilities
      - name: npm audit — frontend (high/critical)
        run: npm audit --audit-level=high
        working-directory: frontend/elcarehub-app

      - name: npm audit — indexer (high/critical)
        run: npm audit --audit-level=high
        working-directory: indexer

  contracts:
    name: Build and Test Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Check Formatting
        run: cargo fmt --check
      - name: Run Cargo Clippy (Linting)
        run: cargo clippy
      - name: Build WASM Dependencies
        run: cargo build --target wasm32v1-none --release
      - name: Run Unit Tests
        run: cargo test

  frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: frontend/elcarehub-app/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('frontend/elcarehub-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install Dependencies
        run: npm ci
        working-directory: frontend/elcarehub-app
      - name: Run Lint
        run: npm run lint
        working-directory: frontend/elcarehub-app
      - name: Run Build
        run: npm run build
        working-directory: frontend/elcarehub-app
      - name: Run Tests
        run: npm run test
        working-directory: frontend/elcarehub-app

  indexer:
    name: Build and Test Indexer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: ${{ runner.os }}-indexer-${{ matrix.node-version }}-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-indexer-${{ matrix.node-version }}-
      - name: Install Dependencies
        run: npm ci
        working-directory: indexer
      - name: Run Lint
        run: npm run lint
        working-directory: indexer
      - name: Run Build
        run: npm run build
        working-directory: indexer
      - name: Run Tests
        run: npm run test
        working-directory: indexer

    fill="none" stroke="#6b8cff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="200" y="360" font-family="sans-serif" font-size="13" fill="#6b8cff" text-anchor="middle" font-weight="600">ElcareHub</text>
  <text x="200" y="378" font-family="sans-serif" font-size="10" fill="#9aabcc" text-anchor="middle">Loading…</text>

<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f4ff"/>
  <!-- Card -->
  <rect x="60" y="60" width="280" height="280" rx="20" fill="#e8eeff" stroke="#6b8cff" stroke-width="1.5"/>
  <!-- Cross vertical -->
  <rect x="182" y="120" width="36" height="120" rx="8" fill="#6b8cff"/>
  <!-- Cross horizontal -->
  <rect x="140" y="162" width="120" height="36" rx="8" fill="#6b8cff"/>
  <!-- Center accent dot -->
  <circle cx="200" cy="180" r="12" fill="#E27D60"/>
  <!-- Pulse line -->
